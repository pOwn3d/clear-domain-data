<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'Liberation Mono', monospace;
      --font-sans: -apple-system, 'Segoe UI', system-ui, sans-serif;
      --bg-primary: #0c0c0e;
      --bg-secondary: #141418;
      --bg-tertiary: #1a1a20;
      --bg-hover: #22222a;
      --border: #2a2a35;
      --border-focus: #ff4d4d;
      --text-primary: #e8e6e3;
      --text-secondary: #8a8a95;
      --text-muted: #55555f;
      --accent: #ff4d4d;
      --accent-dim: rgba(255, 77, 77, 0.15);
      --accent-glow: rgba(255, 77, 77, 0.3);
      --success: #00e676;
      --success-dim: rgba(0, 230, 118, 0.15);
      --error: #ff5252;
      --checkbox-bg: #1e1e26;
      --checkbox-checked: #ff4d4d;
      --tag-bg: rgba(255, 77, 77, 0.08);
      --tag-border: rgba(255, 77, 77, 0.2);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #f5f3f0;
        --bg-secondary: #edeae6;
        --bg-tertiary: #e5e2dd;
        --bg-hover: #ddd9d4;
        --border: #d0ccc6;
        --border-focus: #d93636;
        --text-primary: #1a1a1a;
        --text-secondary: #6b6b6b;
        --text-muted: #9a9a9a;
        --accent: #d93636;
        --accent-dim: rgba(217, 54, 54, 0.1);
        --accent-glow: rgba(217, 54, 54, 0.2);
        --success: #1b8a4a;
        --success-dim: rgba(27, 138, 74, 0.1);
        --error: #d93636;
        --checkbox-bg: #e5e2dd;
        --checkbox-checked: #d93636;
        --tag-bg: rgba(217, 54, 54, 0.06);
        --tag-border: rgba(217, 54, 54, 0.15);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      width: 360px;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      padding: 16px 18px 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .header img {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      opacity: 0.9;
    }

    .header h3 {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }

    .header .version-tag {
      margin-left: auto;
      font-size: 9px;
      font-weight: 500;
      color: var(--accent);
      background: var(--tag-bg);
      border: 1px solid var(--tag-border);
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .lang-select {
      margin-left: 4px;
      padding: 2px 4px;
      font-family: inherit;
      font-size: 9px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
    }

    .lang-select:hover {
      border-color: var(--text-muted);
    }

    /* Domain input */
    .input-group {
      margin-bottom: 8px;
    }

    .domain-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }

    .domain-tags:empty {
      display: none;
    }

    .domain-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px 3px 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--tag-border);
      border-radius: 4px;
      max-width: 180px;
      animation: __tagIn 0.15s ease;
    }

    @keyframes __tagIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .domain-tag span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .domain-tag-remove {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      opacity: 0.6;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .domain-tag-remove:hover {
      opacity: 1;
    }

    .domain-input-row {
      display: flex;
      gap: 4px;
    }

    .domain-input {
      flex: 1;
      padding: 10px 12px 10px 14px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .domain-input::placeholder {
      color: var(--text-muted);
    }

    .domain-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-dim), inset 0 0 0 1px var(--accent-dim);
    }

    .add-domain-btn {
      width: 38px;
      background: var(--bg-secondary);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-domain-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Toggle row */
    .protocol-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
    }

    .toggle-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      font-size: 10.5px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .toggle-chip:first-child {
      border-radius: 5px 0 0 5px;
    }

    .toggle-chip:last-child {
      border-radius: 0 5px 5px 0;
      border-left: none;
    }

    .toggle-chip:hover {
      background: var(--bg-hover);
    }

    .toggle-chip:has(input:checked) {
      background: var(--accent-dim);
      border-color: var(--tag-border);
      color: var(--accent);
    }

    .toggle-chip input {
      display: none;
    }

    /* Section */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .section-label {
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
    }

    .select-actions {
      display: flex;
      gap: 2px;
    }

    .select-actions a {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      text-decoration: none;
      padding: 2px 7px;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .select-actions a:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    /* Options grid */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      margin-bottom: 12px;
    }

    .options label {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .options label:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .options label:has(input:checked) {
      color: var(--text-primary);
    }

    /* Custom checkboxes */
    .options input[type="checkbox"],
    .bottom-options input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: var(--checkbox-bg);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .options input[type="checkbox"]:checked,
    .bottom-options input[type="checkbox"]:checked {
      background: var(--checkbox-checked);
      border-color: var(--checkbox-checked);
    }

    .options input[type="checkbox"]:checked::after,
    .bottom-options input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3.5px;
      top: 1px;
      width: 4px;
      height: 7px;
      border: solid var(--bg-primary);
      border-width: 0 1.5px 1.5px 0;
      transform: rotate(45deg);
    }

    /* Clear button */
    button#btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    button#btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    button#btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 20px var(--accent-glow);
      transform: translateY(-1px);
    }

    button#btn:active {
      transform: translateY(0) scale(0.99);
      filter: brightness(0.95);
    }

    button#btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      filter: none;
      box-shadow: none;
    }

    /* Bottom options */
    .bottom-options {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .bottom-options label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .bottom-options label:hover {
      color: var(--text-secondary);
    }

    .bottom-options input[type="checkbox"] {
      width: 12px;
      height: 12px;
    }

    .bottom-options input[type="checkbox"]:checked::after {
      left: 2.5px;
      top: 0.5px;
      width: 3.5px;
      height: 6px;
    }

    /* Status */
    #status {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.6;
    }

    .result-item {
      padding: 2px 0;
      font-weight: 500;
      animation: slideIn 0.25s ease both;
    }

    .result-ok { color: var(--success); }
    .result-err { color: var(--error); }

    .success-flash {
      font-weight: 600;
      font-size: 12px;
      text-align: center;
      padding: 6px 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Keyboard shortcut hint */
    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .shortcut-label {
      white-space: nowrap;
    }

    .shortcut-recorder {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 3px 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      min-width: 70px;
      justify-content: center;
    }

    .shortcut-recorder:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
    }

    .shortcut-recorder.recording {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 2px var(--accent-dim); }
      50% { box-shadow: 0 0 0 4px var(--accent-dim); }
    }

    .shortcut-recorder kbd {
      display: inline-block;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 8.5px;
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 3px;
      line-height: 1.4;
    }

    .shortcut-recorder .recording-text {
      font-size: 9px;
      color: var(--accent);
      font-weight: 500;
    }

    .shortcut-reset {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      transition: all 0.15s;
      font-family: inherit;
      line-height: 1;
    }

    .shortcut-reset:hover {
      color: var(--text-secondary);
      background: var(--bg-hover);
    }

    /* Loader picker */
    .loader-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 9px;
      color: var(--text-muted);
    }

    .loader-label {
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    .loader-options {
      display: flex;
      gap: 3px;
    }

    .loader-pick {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.15s;
      padding: 0;
      font-family: inherit;
      line-height: 1;
    }

    .loader-pick:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
      transform: scale(1.1);
    }

    .loader-pick.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    /* Recent domains */
    .recents-wrapper {
      margin-bottom: 10px;
    }

    .recents-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .recent-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .recent-chip:hover {
      background: var(--accent-dim);
      border-color: var(--tag-border);
      color: var(--accent);
    }

    .clear-recents {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      padding: 2px 7px;
      border-radius: 3px;
      transition: all 0.15s;
    }

    .clear-recents:hover {
      color: var(--error);
      background: var(--bg-hover);
    }

    /* Cookie counter */
    .cookie-count {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      color: var(--text-muted);
      min-height: 14px;
    }

    /* Confirmation modal */
    .confirm-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .confirm-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      text-align: center;
      width: 260px;
    }

    .confirm-content p {
      font-size: 12px;
      color: var(--text-primary);
      margin-bottom: 14px;
    }

    .confirm-actions {
      display: flex;
      gap: 8px;
    }

    .confirm-yes {
      flex: 1;
      padding: 7px 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .confirm-yes:hover {
      filter: brightness(1.1);
    }

    .confirm-no {
      flex: 1;
      padding: 7px 12px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-family: var(--font-sans);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .confirm-no:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon-48.png" alt="" />
      <h3>Clear Domain Data</h3>
      <span class="version-tag">v1.4</span>
      <select id="langSelect" class="lang-select">
        <option value="en">EN</option>
        <option value="fr">FR</option>
        <option value="es">ES</option>
        <option value="de">DE</option>
        <option value="pt">PT</option>
      </select>
    </div>

    <div id="recentsWrapper" class="recents-wrapper" style="display:none;">
      <div class="section-header">
        <span class="section-label">Recent</span>
        <a id="clearRecents" class="clear-recents">Clear</a>
      </div>
      <div id="recentsList" class="recents-list"></div>
    </div>

    <div class="input-group">
      <div id="domainTags" class="domain-tags"></div>
      <div class="domain-input-row">
        <input type="text" id="domain" class="domain-input" placeholder="example.com" spellcheck="false" autocomplete="off" />
        <button type="button" id="addDomain" class="add-domain-btn" title="Add domain">+</button>
      </div>
      <span id="cookieCount" class="cookie-count"></span>
    </div>

    <div class="protocol-toggle">
      <label class="toggle-chip">
        <input type="checkbox" id="includeHttp" /> HTTP
      </label>
      <label class="toggle-chip">
        <input type="checkbox" id="includeSubdomains" /> Subdomains
      </label>
    </div>

    <div class="section-header">
      <span class="section-label">Data types</span>
      <div class="select-actions">
        <a id="selectAll">All</a>
        <a id="selectNone">None</a>
      </div>
    </div>

    <div class="options">
      <label><input type="checkbox" class="opt" value="cache" checked /> Cache</label>
      <label><input type="checkbox" class="opt" value="cookies" checked /> Cookies</label>
      <label><input type="checkbox" class="opt" value="localStorage" checked /> localStorage</label>
      <label><input type="checkbox" class="opt" value="indexedDB" checked /> IndexedDB</label>
      <label><input type="checkbox" class="opt" value="serviceWorkers" checked /> SW</label>
      <label><input type="checkbox" class="opt" value="cacheStorage" checked /> CacheStorage</label>
      <label><input type="checkbox" class="opt" value="sessionStorage" checked /> sessionStorage</label>
      <label><input type="checkbox" class="opt" value="history" /> History</label>
    </div>

    <button id="btn">Clear selected data</button>

    <div class="bottom-options">
      <label><input type="checkbox" id="autoReload" checked /> Reload tab</label>
      <label><input type="checkbox" id="autoClose" checked /> Auto-close</label>
      <label><input type="checkbox" id="confirmClear" /> Confirm before clear</label>
      <label><input type="checkbox" id="showNotification" checked /> Notify on shortcut</label>
    </div>

    <div id="status"></div>

    <div class="loader-row">
      <span class="loader-label">Loader:</span>
      <div class="loader-options" id="loaderOptions">
        <button class="loader-pick active" data-loader="spinner" title="Spinner">⟳</button>
        <button class="loader-pick" data-loader="pacman" title="Pac-Man">ᗧ</button>
        <button class="loader-pick" data-loader="broom" title="Broom">🧹</button>
        <button class="loader-pick" data-loader="matrix" title="Matrix">⌨</button>
        <button class="loader-pick" data-loader="nuke" title="Nuke">💥</button>
        <button class="loader-pick" data-loader="fire" title="Fire">🔥</button>
        <button class="loader-pick" data-loader="bounce" title="Bounce">●</button>
      </div>
    </div>

    <div class="shortcut-row">
      <span class="shortcut-label">Quick clear:</span>
      <button id="shortcutBtn" class="shortcut-recorder" title="Click to record a new shortcut">
        <span id="shortcutKeys"><kbd>⌘</kbd> <kbd>⇧</kbd> <kbd>X</kbd></span>
      </button>
      <button id="shortcutReset" class="shortcut-reset" title="Reset to default">↺</button>
    </div>

    <div id="confirmModal" class="confirm-modal" style="display:none;">
      <div class="confirm-content">
        <p>Clear data for <strong id="confirmDomain"></strong>?</p>
        <div class="confirm-actions">
